augmentation:
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    hue: 0.1
    saturation: 0.2
  horizontal_flip: true
  random_erase: 0.25
  rotation: 15
  use_auto_augment: true
  vertical_flip: false
dataset:
  class_names:
  - cloudy
  - rain
  - shine
  - sunrise
  data_dir: ./data
  img_size: 224
  name: weather
  num_classes: 4
  train_val_test_split:
  - 0.7
  - 0.15
  - 0.15
evaluation:
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - confusion_matrix
  top_k:
  - 1
  - 3
inference:
  batch_size: 64
  input_size: 224
  model_path: ./checkpoints/best_model.pth
logging:
  checkpoint_dir: ./checkpoints
  log_dir: ./results/logs
  log_interval: 10
  save_interval: 5
model:
  backbone: efficientnet_b0
  drop_rate: 0.3
  num_classes: 4
  pretrained: true
project:
  device: cuda
  name: weather-classification
  num_workers: 0
  seed: 42
training:
  batch_size: 8
  early_stopping_patience: 10
  epochs: 50
  gradient_clip: 1.0
  label_smoothing: 0.1
  learning_rate: 0.0001
  optimizer: adamw
  save_best_only: true
  scheduler: cosine
  warmup_epochs: 5
  weight_decay: 0.0001
