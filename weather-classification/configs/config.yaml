# 天气图像分类项目配置

# 项目基础设置
project:
  name: "weather-classification"
  seed: 42
  device: "auto"  # auto: 自动选择 | cuda: 强制 GPU | cpu: 强制 CPU | cuda:0: 指定 GPU
  num_workers: 0

# GPU / CPU 差异化配置（根据实际设备自动应用）
device_settings:
  cpu:
    batch_size: 8
    num_workers: 0
    pin_memory: false
    cudnn_benchmark: false
    deterministic: true
  cuda:
    batch_size: 32
    num_workers: 0
    pin_memory: true
    cudnn_benchmark: true
    deterministic: false

# 数据集配置
dataset:
  name: "weather"  # 数据集名称
  data_dir: "./data"  # 数据集根目录
  num_classes: 4  # 类别数（与 data/train/ 子目录一致）
  class_names: ["cloudy", "rainy", "snowy", "sunny"]  # 类别名称
  img_size: 300  # 输入图像尺寸
  train_val_test_split: [0.8, 0.1, 0.1]  # 训练/验证/测试划分比例

# 模型配置
model:
  backbone: "efficientnet_b0"  # 主干网络: resnet50, efficientnet_b0, vit_base_patch16_224 等
  pretrained: true  # 是否使用ImageNet预训练权重
  drop_rate: 0.3  # Dropout率
  num_classes: 4  # 输出类别数

# 训练配置
training:
  batch_size: 8
  epochs: 1      #40
  learning_rate: 0.001    #0.001
  weight_decay: 0.0001
  optimizer: "adamw"  # adam, adamw, sgd
  scheduler: "cosine"  # cosine, step, plateau
  warmup_epochs: 5
  label_smoothing: 0.1
  gradient_clip: 1.0
  early_stopping_patience: 10
  save_best_only: true
  use_class_weights: true       # 按训练集分布自动加权，提升少数类 F1
  best_metric: "f1_macro"       # 最佳模型选型: f1_macro | accuracy

# 数据增强配置
augmentation:
  use_auto_augment: true
  horizontal_flip: true
  vertical_flip: false
  rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  random_erase: 0.25  # Random Erasing概率

# 评估配置
evaluation:
  metrics: ["accuracy", "precision", "recall", "f1", "confusion_matrix"]
  top_k: [1, 3]

# 日志与检查点
logging:
  log_dir: "./results/logs"
  checkpoint_dir: "./checkpoints"
  log_interval: 10  # 每多少个batch打印一次日志
  save_interval: 5  # 每多少个epoch保存一次检查点

# 推理配置
inference:
  model_path: "./checkpoints/best_model.pth"
  input_size: 224
  batch_size: 64
